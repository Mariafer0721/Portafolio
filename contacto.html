<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Sitio</title>
    <link rel="stylesheet" href="contact.css">
</head>
    <body>

        <!-- NAV -->
        <nav class="navbar-custom">
            <div class="nav-container">
            <img src="IMG/logo.svg" class="logo-img" alt="logo">

            <ul class="nav-menu">
                <li><a class="nav-link" href="index.html">Sobre mi</a></li>
                <li><a class="nav-link" href="mis_trabajos.html">Mis trabajos</a></li>
                <li><a class="nav-link active" href="contacto.html">Contacto</a></li>
            </ul>
            </div>
        </nav>

        <section class="contact-section">
             <!-- CUADRO DE TEXTO -->
            <div class="contact-left">
                <div class="contact-text">
                <h2>Contáctame</h2>
                <p>
                    ¿Tienes alguna pregunta o quieres encargar un retrato personalizado?
                    Déjame tu mensaje y me pondré en contacto contigo lo antes posible.
                </p>
                </div>

                <!-- CUADRO INFO ADICIONAL -->
                <div class="contact-info">
                <h3>Información</h3>
                <p>Bogota D.C</p>
                <p>Telefono: 3004357790</p>
                <p>Instagram:<a href="https://www.instagram.com/pets.arty/" target="_blank">pets.arty</a></p>
                </div>
            </div>

            <!-- FORMULARIO -->
            <div class="contact-form">
                <form action="#" method="POST">
                    <label for="name">Nombre completo</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="@" required>

                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" placeholder="Escribe tu mensaje" rows="5" required></textarea>

                    <button type="submit">Enviar</button>
                </form>
            </div>
        </section>        

        <!-- FOOTER -->
        <footer class="footer">
            <div class="footer-logo">
                <a href="index.html">
                <img src="IMG/logo.svg" alt="logo">
                </a>
            </div>
        </footer>

       
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
